name: Build and deploy DashLab
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  deploy:
    runs-on: dashlab
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Docker CLI and Compose
        run: |
          set -eu
          if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            exit 0
          fi
          apt-get update
          apt-get install -y curl ca-certificates
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-29.1.3.tgz -o /tmp/docker.tgz
          tar -xzf /tmp/docker.tgz -C /tmp
          install -m 0755 /tmp/docker/docker /usr/local/bin/docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/download/v2.40.3/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod 0755 /usr/local/lib/docker/cli-plugins/docker-compose
          docker version
          docker compose version
      - name: Validate secrets
        env:
          POSTGRES_PASSWORD: "${{ secrets.POSTGRES_PASSWORD }}"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          EXPO_TOKEN: "${{ secrets.EXPO_TOKEN }}"
        run: |
          set -eu
          test -n "$POSTGRES_PASSWORD"
          test ${#JWT_SECRET} -ge 32
          test -n "$EXPO_TOKEN"
      - name: Test and build
        run: |
          npm --prefix backend ci
          npm --prefix backend run prisma:generate
          npm --prefix backend run build
          npm --prefix web ci
          npm --prefix web run build
      - name: Deploy containers
        env:
          POSTGRES_PASSWORD: "${{ secrets.POSTGRES_PASSWORD }}"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          PROMETHEUS_URL: "${{ secrets.PROMETHEUS_URL }}"
        run: |
          set -eu
          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is unavailable"
            exit 1
          fi
          umask 077
          printf 'POSTGRES_PASSWORD=%s\nJWT_SECRET=%s\nPROMETHEUS_URL=%s\n' "$POSTGRES_PASSWORD" "$JWT_SECRET" "${PROMETHEUS_URL:-http://127.0.0.1:9090}" > .env
          $COMPOSE --env-file .env build --pull
          $COMPOSE --env-file .env up -d postgres
          $COMPOSE --env-file .env run --rm backend npx prisma migrate deploy
          $COMPOSE --env-file .env up -d
          $COMPOSE --env-file .env ps
      - name: Trigger Android build on Expo Cloud
        working-directory: mobile
        env:
          EXPO_TOKEN: "${{ secrets.EXPO_TOKEN }}"
        run: |
          set -eu
          npm ci
          npx eas-cli@latest whoami
          npx eas-cli@latest build --platform android --profile production --non-interactive --no-wait
